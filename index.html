<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pookie generator 💌</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:linear-gradient(135deg,#ffd6e8,#e6f7ff);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CAPTURE AREA */
.capture{
  width:320px;
  margin-top:40px;
}

/* card */
.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.top{
  background:linear-gradient(45deg,#ff6fa5,#ffb86c);
  padding:12px;
  color:white;
  font-weight:bold;
  text-align:center;
}

.question{
  padding:20px;
  font-size:17px;
  color:#333;
}

/* reply */
.reply{
  margin-top:15px;
  padding:15px;
  background:white;
  border-radius:16px;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

/* meta */
.meta{
  font-size:12px;
  text-align:center;
  margin-top:5px;
  color:#666;
}

/* inputs (outside capture) */
.controls{
  width:320px;
  margin-top:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff6fa5;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- CAPTURE AREA -->
<div id="capture" class="capture">

<div class="card">
  <div class="top">send me anonymous messages 💌</div>
  <div class="question" id="q">your question...</div>
</div>

<div class="reply" id="r">your reply...</div>
<div class="meta" id="seen">seen by 23 people 👀</div>

</div>

<!-- CONTROLS -->
<div class="controls">
  <input id="inputQ" placeholder="type question...">
  <input id="inputR" placeholder="type reply...">
  <button onclick="generate()">generate + download 💕</button>
</div>

<script>
function generate(){
  let q = document.getElementById("inputQ").value;
  let r = document.getElementById("inputR").value;

  document.getElementById("q").innerText = q;
  document.getElementById("r").innerText = r;

  let num = Math.floor(Math.random()*40)+10;
  document.getElementById("seen").innerText =
    "seen by " + num + " people 👀";

  setTimeout(downloadImage, 300);
}

function downloadImage(){
  html2canvas(document.getElementById("capture")).then(canvas=>{
    let link = document.createElement("a");
    link.download = "story.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
