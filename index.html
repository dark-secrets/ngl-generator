<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>secret tool 💌</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:linear-gradient(135deg,#ffd6e8,#e6f7ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* input box */
.box{
  width:320px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff6fa5;
  color:white;
  font-weight:bold;
}

/* FINAL VIEW */
.viewer{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#ffd6e8,#e6f7ff);
  justify-content:center;
  align-items:center;
}

/* small ngl card */
.card{
  width:260px;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.top{
  background:linear-gradient(45deg,#ff6fa5,#ffb86c);
  padding:10px;
  color:white;
  font-size:13px;
  text-align:center;
}

.question{
  padding:16px;
  font-size:15px;
  text-align:center;
}

/* small hint */
.hint{
  position:absolute;
  bottom:20px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- INPUT -->
<div class="box" id="inputPage">
  <input id="q" placeholder="type question...">
  <input id="r" placeholder="type reply (optional)...">
  <button onclick="go()">generate 💌</button>
</div>

<!-- FINAL VIEW -->
<div class="viewer" id="viewer">
  <div class="card">
    <div class="top">send me anonymous messages 💌</div>
    <div class="question" id="finalQ"></div>
  </div>

  <div class="hint">take screenshot ✨</div>
</div>

<script>
function go(){
  let q = document.getElementById("q").value;

  document.getElementById("finalQ").innerText = q;

  document.getElementById("inputPage").style.display="none";
  document.getElementById("viewer").style.display="flex";
}
</script>

</body>
</html>
