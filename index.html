<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>secret tool 💌</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#fff;
}

/* INPUT */
.box{
  width:320px;
  margin:100px auto;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff6fa5;
  color:white;
  font-weight:bold;
}

/* FINAL VIEW */
.viewer{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#ffe4ec,#eef7ff);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* message box */
.bubble{
  max-width:260px;
  background:white;
  padding:16px;
  border-radius:18px;
  font-size:15px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* reply */
.reply{
  margin-top:18px;
  font-size:18px;
  color:#222;
}

/* subtle tag */
.tag{
  margin-top:6px;
  font-size:12px;
  color:#888;
}

</style>
</head>

<body>

<!-- INPUT -->
<div class="box" id="inputPage">
  <input id="q" placeholder="type question...">
  <input id="r" placeholder="type reply (optional)...">
  <button onclick="go()">generate 💌</button>
</div>

<!-- FINAL -->
<div class="viewer" id="viewer">

  <div class="bubble" id="finalQ"></div>

  <div class="reply" id="finalR"></div>
  <div class="tag">replying…</div>

</div>

<script>
function go(){
  let q = document.getElementById("q").value;
  let r = document.getElementById("r").value;

  document.getElementById("finalQ").innerText = q;
  document.getElementById("finalR").innerText = r;

  document.getElementById("inputPage").style.display="none";
  document.getElementById("viewer").style.display="flex";
}
</script>

</body>
</html>
